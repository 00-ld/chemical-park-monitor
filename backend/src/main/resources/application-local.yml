# 本机开发配置：用于直接运行 `mvn spring-boot:run`。
# 数据库密码通过 SPRING_DATASOURCE_PASSWORD 或 DB_PASSWORD 传入，不写死到仓库。
spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://127.0.0.1:3306/chemical?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:${DB_PASSWORD:}}

server:
  port: ${SERVER_PORT:8081}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}

analysis:
  service:
    url: ${ANALYSIS_SERVICE_URL:http://127.0.0.1:8001/api/analysis/person}

inspection:
  default-location: ${INSPECTION_DEFAULT_LOCATION:核心作业区 A7}
