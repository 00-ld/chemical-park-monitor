server {
    listen 80;
    server_name _;

    # 安全响应头
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Content-Security-Policy 说明：
    #   default-src 'self'               — 默认只允许同源加载资源
    #   script-src 'self'                — 脚本仅限同源（若构建产物含内联脚本导致白屏，可追加 'unsafe-inline'）
    #   style-src 'self' 'unsafe-inline' — Vue 运行时动态注入内联样式，需保留 unsafe-inline
    #   connect-src                      — XHR/fetch/WebSocket：同源 + 和风天气 API 域名
    #   img-src 'self' data: https:      — 允许同源、base64 Data URI 及任意 HTTPS 图片（含地图瓦片）
    #   frame-src 'self' http: https:    — 允许嵌入 SuperMap iPortal 数字大屏
    #   font-src 'self' data:            — 允许同源字体及 base64 内嵌字体
    #   frame-ancestors 'self'           — 防止被第三方页面 iframe 嵌入（与 X-Frame-Options 冗余互补）
    #   base-uri 'self'                  — 防止 <base> 标签注入劫持相对 URL
    #   form-action 'self'               — 表单只能提交到同源
    # 如前端出现白屏或功能异常，请打开浏览器控制台查看 CSP 违规报告，按提示放宽对应指令。
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; connect-src 'self' https://devapi.qweather.com https://*.qweather.com; img-src 'self' data: https:; font-src 'self' data:; frame-src 'self' http: https:; frame-ancestors 'self'; base-uri 'self'; form-action 'self';" always;

    # HSTS（仅 HTTPS 有效，当前监听 HTTP 80 端口，启用前必须先完成 TLS 配置）
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;  # 启用 HTTPS 后取消注释

    # Gzip 压缩
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
    gzip_min_length 1000;

    # 前端静态文件
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # Java 后端 API
    location /api/ {
        proxy_pass http://backend:8081/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_read_timeout 120s;
    }

    # WebSocket（需在连接URL中携带token参数，后端验证）
    location /ws/ {
        proxy_pass http://backend:8081/ws/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 3600s;
    }

    # Python 算法服务
    location /algorithm-api/ {
        rewrite ^/algorithm-api/(.*) /$1 break;
        proxy_pass http://algorithm:8000;
        # 由 nginx 注入算法服务密钥，避免密钥下发到浏览器
        # （仅 ALGORITHM_API_KEY 经 envsubst 替换，见 docker-compose NGINX_ENVSUBST_FILTER）
        proxy_set_header X-API-Key "${ALGORITHM_API_KEY}";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_read_timeout 300s;
    }

    # 静态资源缓存
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        root /usr/share/nginx/html;
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }
}
