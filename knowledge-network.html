  { source: 'TokenInterceptor', target: 'User', type: 'uses', label: 'validate' },

  // --- Frontend connections ---
  { source: 'login/index.vue', target: 'user/index.ts', type: 'call', label: 'reqLogin' },
  { source: 'user/index.ts', target: 'request.ts', type: 'call', label: 'import' },
  { source: 'request.ts', target: 'token.ts', type: 'call', label: 'GET_TOKEN' },
  { source: 'request.ts', target: 'user.ts(store)', type: 'call', label: 'useUserStore' },
  { source: 'user.ts(store)', target: 'user/index.ts', type: 'call', label: 'reqLogin' },
  { source: 'user.ts(store)', target: 'token.ts', type: 'call', label: 'SET_TOKEN' },
  { source: 'CarHome.vue', target: 'carStore.ts', type: 'call', label: 'useCarStore' },
  { source: 'carStore.ts', target: 'request.ts', type: 'call', label: 'import' },
  { source: 'algorithm.ts', target: 'algorithmClient.ts', type: 'call', label: 'import' },
  { source: 'algorithmClient.ts', target: 'request.ts', type: 'parallel', label: 'axios' },

  // Data connections
  { source: 'carPatrolRoutes.js', target: 'parkAssets.js', type: 'depends', label: 'roads' },
  { source: 'coordinate.js', target: 'parkAssets.js', type: 'parallel', label: 'GEO_REF' },
  { source: 'gasSourceCatalog.js', target: 'parkAssets.js', type: 'depends', label: 'facilities' },
  { source: 'pathPlanning.ts', target: 'parkAssets.js', type: 'depends', label: 'Road' },

  // Emergency view connections
  { source: 'emergency/index.vue', target: 'pathPlanning.ts', type: 'call', label: 'findPath' },
  { source: 'emergency/index.vue', target: 'gasSourceCatalog.js', type: 'call', label: 'validate' },
  { source: 'emergency/index.vue', target: 'parkAssets.js', type: 'call', label: 'facilities' },

  // Screen connections
  { source: 'screen/index.vue', target: 'algorithm.ts', type: 'call', label: 'runDiffusion' },
  { source: 'screen/index.vue', target: 'carStore.ts', type: 'call', label: 'fetchAllCars' },
  { source: 'screen/index.vue', target: 'parkAssets.js', type: 'call', label: 'zones' },
];

// ============================================================
//  SELF-LEARNING STATE
// ============================================================
const learningState = {
  visitCount: {},    // nodeId -> count
  pathMemory: [],    // recent traversal paths
  affinity: {},      // nodeA -> nodeB -> co-visit count
  totalClicks: 0,
};

function recordVisit(nodeId) {
  learningState.visitCount[nodeId] = (learningState.visitCount[nodeId] || 0) + 1;
  learningState.totalClicks++;
  learningState.pathMemory.push(nodeId);
  if (learningState.pathMemory.length > 30) learningState.pathMemory.shift();
  // Build affinity from recent path
  if (learningState.pathMemory.length >= 2) {
    const last = learningState.pathMemory[learningState.pathMemory.length - 1];
    const prev = learningState.pathMemory[learningState.pathMemory.length - 2];
    if (!learningState.affinity[last]) learningState.affinity[last] = {};
    if (!learningState.affinity[prev]) learningState.affinity[prev] = {};
    learningState.affinity[last][prev] = (learningState.affinity[last][prev] || 0) + 1;
    learningState.affinity[prev][last] = (learningState.affinity[prev][last] || 0) + 1;
  }
  updateLearningPanel();
  saveLearning();
}

function getVisitCount(nodeId) { return learningState.visitCount[nodeId] || 0; }
function getAffinity(a, b) { return (learningState.affinity[a] && learningState.affinity[a][b]) || 0; }

function saveLearning() {
  try { localStorage.setItem('knn-learning', JSON.stringify(learningState)); } catch(e) {}
}
function loadLearning() {
  try {
    const d = localStorage.getItem('knn-learning');
    if (d) Object.assign(learningState, JSON.parse(d));
  } catch(e) {}
}

function updateLearningPanel() {
  const list = document.getElementById('learning-list');
  const sorted = Object.entries(learningState.visitCount).sort((a,b) => b[1] - a[1]).slice(0, 8);
  if (sorted.length === 0) {
    list.innerHTML = '<div style="font-size:11px;color:#556080;">Click nodes to begin learning</div>';
    return;
  }
  list.innerHTML = sorted.map(([id, count]) => `<div class="learn-item"><span>${id}</span><span class="freq">${count}x</span></div>`).join('');
  document.getElementById('stat-explored').textContent = Object.keys(learningState.visitCount).length;
}

// ============================================================
//  GRAPH RENDERING
// ============================================================
loadLearning();

const svg = d3.select('#graph-svg');
const width = window.innerWidth;
const height = window.innerHeight;

// Build graph data
const graphNodes = nodes.map(n => ({ ...n }));
const nodeMap = {};
graphNodes.forEach(n => nodeMap[n.id] = n);

const graphEdges = edges.filter(e => nodeMap[e.source] && nodeMap[e.target]).map(e => ({
  ...e,
  source: nodeMap[e.source] || e.source,
  target: nodeMap[e.target] || e.target,
}));

// Stats
document.getElementById('stat-nodes').textContent = graphNodes.length;
document.getElementById('stat-edges').textContent = graphEdges.length;
document.getElementById('stat-explored').textContent = Object.keys(learningState.visitCount).length;

// Zoom
const g = svg.append('g');
const zoom = d3.zoom().scaleExtent([0.2, 4]).on('zoom', (event) => g.attr('transform', event.transform));
svg.call(zoom);

// Arrow markers
const defs = svg.append('defs');
Object.entries(LAYERS).forEach(([key, layer]) => {
  defs.append('marker')
    .attr('id', `arrow-${key}`)
    .attr('viewBox', '0 -5 10 10')
    .attr('refX', 20)
    .attr('refY', 0)
    .attr('markerWidth', 6)
    .attr('markerHeight', 6)
    .attr('orient', 'auto')
    .append('path')
    .attr('d', 'M0,-4L10,0L0,4')
    .attr('fill', layer.color)
    .attr('opacity', 0.4);
});

// Edge types styling
const edgeStyles = {
  call: { dash: null, opacity: 0.25 },
  uses: { dash: '3,3', opacity: 0.15 },
  implements: { dash: '8,4', opacity: 0.2 },
  depends: { dash: '2,2', opacity: 0.15 },
  parallel: { dash: '6,2', opacity: 0.12 },
};

// Links
const linkGroup = g.append('g').attr('class', 'links');
const link = linkGroup.selectAll('line')
  .data(graphEdges)
  .join('line')
  .attr('class', 'link')
  .attr('stroke', d => {
    const src = typeof d.source === 'object' ? d.source : nodeMap[d.source];
    return src ? LAYERS[src.layer]?.color || '#333' : '#333';
  })
  .attr('stroke-opacity', d => edgeStyles[d.type]?.opacity || 0.2)
  .attr('stroke-width', d => d.type === 'implements' ? 1.5 : 1)
  .attr('stroke-dasharray', d => edgeStyles[d.type]?.dash || null)
  .attr('marker-end', d => {
    const src = typeof d.source === 'object' ? d.source : nodeMap[d.source];
    return src ? `url(#arrow-${src.layer})` : '';
  });

// Link labels
const linkLabelGroup = g.append('g');
const linkLabel = linkLabelGroup.selectAll('text')
  .data(graphEdges.filter(e => e.type === 'call'))
  .join('text')
  .attr('class', 'link-label')
  .text(d => d.label);

// Nodes
const nodeGroup = g.append('g').attr('class', 'nodes');
const node = nodeGroup.selectAll('g')
  .data(graphNodes)
  .join('g')
  .attr('class', 'node-group')
  .call(d3.drag()
    .on('start', dragstarted)
    .on('drag', dragged)
    .on('end', dragended));

// Pulse rings for visited nodes
node.append('circle')
  .attr('class', 'pulse-ring')
  .attr('r', d => Math.min(4 + getVisitCount(d.id) * 1.5, 16))
  .attr('fill', d => LAYERS[d.layer]?.color || '#fff')
  .attr('opacity', d => getVisitCount(d.id) > 0 ? 0.25 : 0);

// Main circles
node.append('circle')
  .attr('class', 'node-circle')
  .attr('r', d => {
    const base = d.methods.length > 0 ? 8 : 5;
    return base + Math.min(getVisitCount(d.id) * 0.5, 6);
  })
  .attr('fill', d => LAYERS[d.layer]?.color || '#fff')
  .attr('fill-opacity', d => 0.6 + Math.min(getVisitCount(d.id) * 0.04, 0.4))
  .attr('stroke', d => LAYERS[d.layer]?.color || '#fff')
  .attr('stroke-width', 1.5)
  .attr('stroke-opacity', 0.4);

// Labels
node.append('text')
  .attr('class', 'node-label')
  .attr('dy', d => (d.methods.length > 0 ? 8 : 5) + 14)
  .text(d => d.id.replace('.vue','').replace('.ts','').replace('.js','').replace('.java',''))
  .attr('fill', d => {
    const c = getVisitCount(d.id);
    return c > 3 ? LAYERS[d.layer]?.color : '#7888a8';
  })
  .attr('font-weight', d => getVisitCount(d.id) > 2 ? 600 : 400);

// Tooltip
const tooltip = d3.select('#tooltip');

node.on('mouseover', function(event, d) {
  const html = `<b>${d.id}</b><br><span style="color:#7888a8">${d.desc}</span><br><span style="color:#556080">${d.methods.length} methods</span>`;
  tooltip.html(html).style('display', 'block');
  tooltip.style('left', (event.pageX + 12) + 'px').style('top', (event.pageY - 10) + 'px');
  highlightConnected(d.id);
}).on('mousemove', function(event) {
  tooltip.style('left', (event.pageX + 12) + 'px').style('top', (event.pageY - 10) + 'px');
}).on('mouseout', function() {
  tooltip.style('display', 'none');
  resetHighlight();
});

node.on('click', function(event, d) {
  event.stopPropagation();
  recordVisit(d.id);
  showDetail(d);
  highlightPath(d.id);
});

svg.on('click', () => { closeDetail(); resetHighlight(); });

function highlightConnected(nodeId) {
  const connected = new Set([nodeId]);
  graphEdges.forEach(e => {
    const s = typeof e.source === 'object' ? e.source.id : e.source;
    const t = typeof e.target === 'object' ? e.target.id : e.target;
    if (s === nodeId) connected.add(t);
    if (t === nodeId) connected.add(s);
  });

  node.select('.node-circle')
    .attr('fill-opacity', d => connected.has(d.id) ? 0.9 : 0.1)
    .attr('stroke-opacity', d => connected.has(d.id) ? 0.8 : 0.1);
  node.select('.node-label')
    .attr('fill-opacity', d => connected.has(d.id) ? 1 : 0.2)
    .attr('font-weight', d => connected.has(d.id) ? 600 : 400);

  link.attr('stroke-opacity', d => {
    const s = typeof d.source === 'object' ? d.source.id : d.source;
    const t = typeof d.target === 'object' ? d.target.id : d.target;
    return (s === nodeId || t === nodeId) ? 0.6 : 0.03;
  }).attr('stroke-width', d => {
    const s = typeof d.source === 'object' ? d.source.id : d.source;
    const t = typeof d.target === 'object' ? d.target.id : d.target;
    return (s === nodeId || t === nodeId) ? 2 : 1;
  });

  linkLabel.attr('fill-opacity', d => {
    const s = typeof d.source === 'object' ? d.source.id : d.source;
    const t = typeof d.target === 'object' ? d.target.id : d.target;
    return (s === nodeId || t === nodeId) ? 1 : 0;
  });
}

function highlightPath(nodeId) {
  // Find self-learning related nodes
  const affinityNodes = Object.entries(learningState.affinity[nodeId] || {}).sort((a,b) => b[1] - a[1]).slice(0,3).map(e => e[0]);
  if (affinityNodes.length > 0) {
    // Add subtle glow to affinity nodes
    node.select('.pulse-ring')
      .attr('opacity', d => affinityNodes.includes(d.id) ? 0.4 : (getVisitCount(d.id) > 0 ? 0.25 : 0))
      .attr('fill', d => affinityNodes.includes(d.id) ? '#ce93d8' : LAYERS[d.layer]?.color || '#fff');
  }
}

function resetHighlight() {
  node.select('.node-circle')
    .attr('fill-opacity', d => 0.6 + Math.min(getVisitCount(d.id) * 0.04, 0.4))
    .attr('stroke-opacity', 0.4);
  node.select('.node-label')
    .attr('fill-opacity', 1)
    .attr('font-weight', d => getVisitCount(d.id) > 2 ? 600 : 400);
  link.attr('stroke-opacity', d => edgeStyles[d.type]?.opacity || 0.2).attr('stroke-width', d => d.type === 'implements' ? 1.5 : 1);
  linkLabel.attr('fill-opacity', 1);
  node.select('.pulse-ring')
    .attr('opacity', d => getVisitCount(d.id) > 0 ? 0.25 : 0)
    .attr('fill', d => LAYERS[d.layer]?.color || '#fff');
}

// Detail Panel
function showDetail(d) {
  const panel = document.getElementById('detail-panel');
  const content = document.getElementById('detail-content');
  const visitCount = getVisitCount(d.id);
  const layerInfo = LAYERS[d.layer];

  // Find connected nodes
  const incoming = [], outgoing = [];
  graphEdges.forEach(e => {
    const s = typeof e.source === 'object' ? e.source.id : e.source;
    const t = typeof e.target === 'object' ? e.target.id : e.target;
    if (s === d.id) outgoing.push({ target: t, label: e.label, type: e.type });
    if (t === d.id) incoming.push({ source: s, label: e.label, type: e.type });
  });

  // Self-learning: find related nodes by co-visits
  const related = Object.entries(learningState.affinity[d.id] || {}).sort((a,b) => b[1] - a[1]).slice(0,5);

  let html = `
    <h2>${d.id}</h2>
    <div class="file-path">${d.file}</div>
    <div style="margin-bottom:8px;">
      <span class="tag" style="background:${layerInfo.color}22;color:${layerInfo.color};border:1px solid ${layerInfo.color}44">${layerInfo.label}</span>
      ${d.isInterface ? '<span class="tag" style="background:#ffab9122;color:#ffab91;border:1px solid #ffab9144">Interface</span>' : ''}
      ${visitCount > 0 ? `<span class="learning-badge">&#9733; Explored ${visitCount}x</span>` : ''}
    </div>
    <div class="section">
      <div class="section-title">Description</div>
      <div style="font-size:12px;color:#a0b0d0;">${d.desc}</div>
    </div>`;

  if (d.api && d.api.length > 0) {
    html += `<div class="section"><div class="section-title">API Endpoints</div>`;
    d.api.forEach(a => html += `<div style="font-size:11px;color:#4dd0e1;font-family:monospace;padding:2px 0;">${a}</div>`);
    html += '</div>';
  }

  if (d.methods.length > 0) {
    html += `<div class="section"><div class="section-title">Methods (${d.methods.length})</div>`;
    d.methods.forEach(m => html += `<span class="tag" style="background:rgba(100,181,246,0.08);color:#8ab4f8;border:1px solid rgba(100,181,246,0.15)">${m}</span>`);
    html += '</div>';
  }

  if (outgoing.length > 0) {
    html += `<div class="section"><div class="section-title">Calls (${outgoing.length})</div>`;
    outgoing.forEach(o => html += `<div class="dep-item" onclick="navigateTo('${o.target}')">&#8594; ${o.target} <span style="color:#556080;font-size:10px;">${o.label}</span></div>`);
    html += '</div>';
  }

  if (incoming.length > 0) {
    html += `<div class="section"><div class="section-title">Called by (${incoming.length})</div>`;
    incoming.forEach(i => html += `<div class="dep-item" onclick="navigateTo('${i.source}')">&#8592; ${i.source} <span style="color:#556080;font-size:10px;">${i.label}</span></div>`);
    html += '</div>';
  }

  if (related.length > 0) {
    html += `<div class="section"><div class="section-title" style="color:#ce93d8;">Frequently Explored Together</div>`;
    related.forEach(([id, count]) => html += `<div class="dep-item" onclick="navigateTo('${id}')">&#9733; ${id} <span style="color:#ce93d8;font-size:10px;">${count}x co-visit</span></div>`);
    html += '</div>';
  }

  content.innerHTML = html;
  panel.classList.add('visible');
}

function closeDetail() {
  document.getElementById('detail-panel').classList.remove('visible');
}

function navigateTo(nodeId) {
  const target = nodeMap[nodeId];
  if (target) {
    recordVisit(nodeId);
    showDetail(target);
    highlightConnected(nodeId);
  }
}

// Search
const searchInput = document.getElementById('search-input');
searchInput.addEventListener('input', function() {
  const q = this.value.toLowerCase().trim();
  if (!q) { resetHighlight(); return; }
  const matches = new Set();
  graphNodes.forEach(n => {
    if (n.id.toLowerCase().includes(q) || n.desc.includes(q) || n.file.toLowerCase().includes(q) ||
        n.methods.some(m => m.toLowerCase().includes(q))) {
      matches.add(n.id);
    }
  });
  node.select('.node-circle')
    .attr('fill-opacity', d => matches.has(d.id) ? 1 : 0.08)
    .attr('stroke-opacity', d => matches.has(d.id) ? 1 : 0.08);
  node.select('.node-label')
    .attr('fill-opacity', d => matches.has(d.id) ? 1 : 0.1)
    .attr('font-weight', d => matches.has(d.id) ? 700 : 400);
  link.attr('stroke-opacity', 0.03);
});

// Layer panel
const layerListEl = document.getElementById('layer-list');
const activeLayers = new Set(Object.keys(LAYERS));

Object.entries(LAYERS).forEach(([key, layer]) => {
  const count = graphNodes.filter(n => n.layer === key).length;
  const item = document.createElement('div');
  item.className = 'layer-item active';
  item.innerHTML = `<span class="swatch" style="background:${layer.color}"></span><span>${layer.label}</span><span class="count">${count}</span>`;
  item.onclick = () => {
    if (activeLayers.has(key)) { activeLayers.delete(key); item.classList.remove('active'); }
    else { activeLayers.add(key); item.classList.add('active'); }
    applyLayerFilter();
  };
  layerListEl.appendChild(item);
});

function applyLayerFilter() {
  node.style('display', d => activeLayers.has(d.layer) ? null : 'none');
  link.style('display', d => {
    const s = typeof d.source === 'object' ? d.source : nodeMap[d.source];
    const t = typeof d.target === 'object' ? d.target : nodeMap[d.target];
    return (activeLayers.has(s.layer) && activeLayers.has(t.layer)) ? null : 'none';
  });
}

// Force simulation
const simulation = d3.forceSimulation(graphNodes)
  .force('link', d3.forceLink(graphEdges).id(d => d.id).distance(120).strength(0.3))
  .force('charge', d3.forceManyBody().strength(-400))
  .force('center', d3.forceCenter(width / 2, height / 2))
  .force('collision', d3.forceCollide().radius(30))
  .force('x', d3.forceX(width / 2).strength(0.03))
  .force('y', d3.forceY(height / 2).strength(0.03))
  .on('tick', ticked);

function ticked() {
  link
    .attr('x1', d => d.source.x).attr('y1', d => d.source.y)
    .attr('x2', d => d.target.x).attr('y2', d => d.target.y);
  linkLabel
    .attr('x', d => (d.source.x + d.target.x) / 2)
    .attr('y', d => (d.source.y + d.target.y) / 2 - 4);
  node.attr('transform', d => `translate(${d.x},${d.y})`);
}

function dragstarted(event, d) {
  if (!event.active) simulation.alphaTarget(0.3).restart();
  d.fx = d.x; d.fy = d.y;
}
function dragged(event, d) { d.fx = event.x; d.fy = event.y; }
function dragended(event, d) {
  if (!event.active) simulation.alphaTarget(0);
  d.fx = null; d.fy = null;
}

// Center the view
// Start zoomed out a bit so labels are readable
setTimeout(() => {
  svg.transition().duration(800).call(zoom.transform, d3.zoomIdentity.translate(width*0.08, height*0.12).scale(0.75));
}, 1000);

// Periodic "neural pulse" animation on random edges
setInterval(() => {
  if (graphEdges.length === 0) return;
  const e = graphEdges[Math.floor(Math.random() * graphEdges.length)];
  const src = typeof e.source === 'object' ? e.source : nodeMap[e.source];
  if (!src) return;
  const pulseG = g.append('circle')
    .attr('cx', src.x).attr('cy', src.y)
    .attr('r', 3)
    .attr('fill', 'none')
    .attr('stroke', LAYERS[src.layer]?.color || '#fff')
    .attr('stroke-width', 1.5)
    .attr('opacity', 0.6);
  pulseG.transition().duration(1200)
    .attr('r', 16)
    .attr('opacity', 0)
    .remove();
}, 2000);

// Initial learning panel update
updateLearningPanel();
</script>
</body>
</html>
