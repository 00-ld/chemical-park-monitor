spring:
  application:
    name: chemical-park-monitor
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:prod}
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://mysql:3306/chemical?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true}
    username: ${SPRING_DATASOURCE_USERNAME:${DB_USERNAME:root}}
    password: ${SPRING_DATASOURCE_PASSWORD:${DB_PASSWORD:}}
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 100MB

server:
  port: ${SERVER_PORT:8081}

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.at.pojo
  configuration:
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
    map-underscore-to-camel-case: true

logging:
  level:
    org.springframework.jdbc.support.JdbcTransactionManager: debug

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://www.cip.lab6119.xyz,https://www.cip.lab6119.xyz}

analysis:
  service:
    url: ${ANALYSIS_SERVICE_URL:}

inspection:
  default-location: ${INSPECTION_DEFAULT_LOCATION:核心作业区 A7}

algorithm:
  api-key: ${ALGORITHM_API_KEY:}

aliyun:
  oss:
    endpoint: ${ALIYUN_OSS_ENDPOINT:https://oss-cn-beijing.aliyuncs.com}
    bucketName: ${ALIYUN_OSS_BUCKET:at-javaweb}
    region: ${ALIYUN_OSS_REGION:cn-beijing}
